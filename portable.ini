; Claude Code Portable - Runtime Configuration
; 
; RUNTIME_MODE controls which Node.js and Git are used:
;
;   portable  = Use bundled Node.js + Git (default, zero system dependency)
;   system    = Use system-installed Node.js + Git (must be on PATH)
;   hybrid    = Use portable Node.js + system Git
;               (useful when system Git is newer/different)
;
; Change this value manually, or run switch-runtime.cmd to toggle.

RUNTIME_MODE=portable
